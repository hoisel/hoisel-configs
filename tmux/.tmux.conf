# remap prefix to Control + a 
set -g prefix C-a 
unbind C-b 
bind C-a send-prefix

# quick pane cycling 
unbind ^A 
bind ^A select-pane -t :.+

# Start window index at 1 (match keyboard order)
set -g base-index 1

# ... and the same for panes
set -g pane-base-index 1

# Re-number windows sequentially after closing them
set -g renumber-windows on

# Prevent shell from remaining windows after setting it once
set -g allow-rename off

# Ativar mouse
set -g mouse on

# Reduz delay do prefix (melhora ALT/CTRL)
set -s escape-time 0

# Habilita sequências de teclas estendidas (tmux 3.2+)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

##### NAVEGAÇÃO ENTRE WINDOWS (CTRL + ALT + SETAS) #####
# Navegar para window anterior
bind -n C-M-Left previous-window

# Navegar para próxima window
bind -n C-M-Right next-window

##### NAVEGAÇÃO ENTRE PANES (CTRL + SETAS) #####

bind -n C-Left  select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up    select-pane -U
bind -n C-Down  select-pane -D

##### SPLIT COM ALT + SETAS #####

# ALT + ←  cria split vertical e posiciona à esquerda
bind -n M-Left  split-window -h

# ALT + →  cria split vertical
bind -n M-Right split-window -h

# ALT + ↑  cria split horizontal
bind -n M-Up    split-window -v

# ALT + ↓  cria split horizontal
bind -n M-Down  split-window -v


##### SPLIT COM ^A + SETAS #####
bind -r Left  split-window -h
bind -r Right split-window -h
bind -r Up    split-window -v
bind -r Down  split-window -v


##### UTILIDADES #####
# Recarregar configuração
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Toggle synchronize-panes (no prefix)
bind -n M-i setw synchronize-panes

# Prefix + f → selecionar window via fzf (popup)
bind-key s display-popup -E "zsh -lc '
tmux list-windows -F \"#{window_index}:#{window_name}\" \
| fzf --reverse --border --prompt=\"Window > \" \
| cut -d: -f1 \
| xargs -I {} tmux select-window -t {}'"
